<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Table</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      padding: 30px 20px;
      color: #333;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 22px;
      font-weight: bold;
      color: #222;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .controls input[type="text"] {
      padding: 7px 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 13px;
      width: 200px;
      outline: none;
    }
    .controls input[type="text"]:focus {
      border-color: #4caf50;
    }

    .controls select {
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 13px;
      background: white;
      cursor: pointer;
      outline: none;
    }

    .controls button {
      padding: 7px 16px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .controls button:hover {
      background: #388e3c;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    thead tr {
      background: #4caf50;
      color: white;
    }

    thead th {
      padding: 12px 16px;
      font-size: 14px;
      font-weight: bold;
      text-align: center;
    }

    tbody tr {
      border-bottom: 1px solid #e0e0e0;
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f9f9f9; }
    tbody tr:nth-child(even) { background: #fafafa; }
    tbody tr:nth-child(even):hover { background: #f1f1f1; }

    tbody td {
      padding: 11px 16px;
      font-size: 14px;
      text-align: center;
      color: #444;
    }

    .no-result {
      text-align: center;
      padding: 20px;
      color: #999;
      font-style: italic;
    }
  </style>
</head>
<body>

  <h2>Student Management Table</h2>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search student name" oninput="renderTable()"/>
    <select id="courseFilter" onchange="renderTable()">
      <option value="All">All Courses</option>
      <option value="CS">CS</option>
      <option value="IT">IT</option>
      <option value="SE">SE</option>
      <option value="ECE">ECE</option>
      <option value="ME">ME</option>
    </select>
    <button onclick="sortByMarks()">Sort by Marks</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Marks</th>
        <th>Course</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <script>
    let sortDesc = false;

    function sortByMarks() {
      sortDesc = !sortDesc;
      renderTable();
    }

    async function renderTable() {
      const search = document.getElementById("searchInput").value;
      const course = document.getElementById("courseFilter").value;

      const url = `api.php?search=${encodeURIComponent(search)}&course=${encodeURIComponent(course)}&sortDesc=${sortDesc}`;

      try {
        const response = await fetch(url);
        const filtered = await response.json();
        const tbody = document.getElementById("tableBody");

        if (filtered.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" class="no-result">No students found.</td></tr>`;
          return;
        }

        tbody.innerHTML = filtered.map(s => `
          <tr>
            <td>${s.id}</td>
            <td>${s.name}</td>
            <td>${s.age}</td>
            <td>${s.marks}</td>
            <td>${s.course}</td>
          </tr>
        `).join('');
      } catch (err) {
        console.error("Error fetching students:", err);
      }
    }

    // Initial render
    renderTable();
  </script>

</body>
</html>
