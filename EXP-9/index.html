<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Electronics Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8b5cf6;
      --primary-hover: #7c3aed;
      --secondary: #38bdf8;
      --secondary-hover: #0284c7;
      --bg-dark: #0f172a;
      --glass-bg: rgba(30, 41, 59, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.15), transparent 25%);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 6px;
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(to right, #a78bfa, #38bdf8);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .subtitle {
      text-align: center;
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 30px;
      font-weight: 400;
    }

    /* Summary Cards */
    .summary {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }
    .summary-card {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 20px;
      flex: 1;
      min-width: 160px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease;
    }
    .summary-card:hover { transform: translateY(-3px); }
    
    .summary-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
    }
    .summary-card::before { background: linear-gradient(to right, #fbbf24, #f59e0b); }
    .summary-card.blue::before  { background: linear-gradient(to right, #60a5fa, #3b82f6); }
    .summary-card.green::before { background: linear-gradient(to right, #34d399, #10b981); }
    .summary-card.red::before   { background: linear-gradient(to right, #f87171, #ef4444); }

    .summary-card .s-val {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 4px;
    }
    .summary-card .s-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .controls input[type="text"],
    .controls select {
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      font-size: 14px;
      color: var(--text-main);
      outline: none;
      font-family: 'Outfit', sans-serif;
      transition: all 0.3s ease;
    }

    .controls input[type="text"]:focus,
    .controls select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }

    .controls input[type="text"] { width: 220px; }
    .controls select option { background: var(--bg-dark); }

    .controls button {
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }
    .controls button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4);
    }
    .controls button.secondary {
      background: linear-gradient(135deg, var(--secondary), var(--secondary-hover));
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
    }
    .controls button.secondary:hover {
      box-shadow: 0 6px 16px rgba(56, 189, 248, 0.4);
    }

    .result-info {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 500;
    }

    /* Table */
    .table-responsive {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--glass-border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    thead tr {
      background: rgba(15, 23, 42, 0.7);
    }

    thead th {
      padding: 16px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--glass-border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: color 0.2s;
    }
    thead th:hover { color: var(--text-main); }

    tbody tr {
      transition: background 0.2s;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255, 255, 255, 0.05); }

    tbody td {
      padding: 16px;
      font-size: 14px;
      color: #cbd5e1;
    }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      background: rgba(255, 255, 255, 0.1);
    }
    .badge-Mobile      { color: #38bdf8; background: rgba(56, 189, 248, 0.15); }
    .badge-Laptop      { color: #c084fc; background: rgba(192, 132, 252, 0.15); }
    .badge-Audio       { color: #4ade80; background: rgba(74, 222, 128, 0.15); }
    .badge-Accessories { color: #fbbf24; background: rgba(251, 191, 36, 0.15); }
    .badge-TV          { color: #f87171; background: rgba(248, 113, 113, 0.15); }
    .badge-Camera      { color: #2dd4bf; background: rgba(45, 212, 191, 0.15); }

    .stock-in    { color: #4ade80; font-weight: 600; }
    .stock-low   { color: #fbbf24; font-weight: 600; }
    .stock-out   { color: #f87171; font-weight: 600; }

    .price { font-weight: 600; color: var(--text-main); }

    .cart-yes { color: #4ade80; font-weight: 600; }
    .cart-no  { color: #64748b; }

    .rating { color: #fbbf24; font-weight: 600; }

    .no-result {
      text-align: center;
      padding: 30px;
      color: var(--text-muted);
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>🛒 Electronics Marketplace</h2>
    <p class="subtitle">Product Inventory & Management Table</p>

    <!-- Summary Cards -->
    <div class="summary">
      <div class="summary-card">
        <div class="s-val" id="totalProducts">0</div>
        <div class="s-label">Total Products</div>
      </div>
      <div class="summary-card blue">
        <div class="s-val" id="inCartCount">0</div>
        <div class="s-label">Items in Cart</div>
      </div>
      <div class="summary-card green">
        <div class="s-val" id="cartTotal">₹0</div>
        <div class="s-label">Cart Total</div>
      </div>
      <div class="summary-card red">
        <div class="s-val" id="outOfStock">0</div>
        <div class="s-label">Out of Stock</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <input type="text" id="searchInput" placeholder="🔍 Search product name..." oninput="renderTable()"/>
      <select id="categoryFilter" onchange="renderTable()">
        <option value="All">All Categories</option>
        <option value="Mobile">Mobile</option>
        <option value="Laptop">Laptop</option>
        <option value="Audio">Audio</option>
        <option value="Accessories">Accessories</option>
        <option value="TV">TV</option>
        <option value="Camera">Camera</option>
      </select>
      <select id="cartFilter" onchange="renderTable()">
        <option value="All">All Items</option>
        <option value="cart">In Cart Only</option>
        <option value="notcart">Not in Cart</option>
      </select>
      <select id="stockFilter" onchange="renderTable()">
        <option value="All">All Stock</option>
        <option value="In Stock">In Stock</option>
        <option value="Low Stock">Low Stock</option>
        <option value="Out of Stock">Out of Stock</option>
      </select>
      <button onclick="sortByPrice()">Sort by Price</button>
      <button onclick="sortByRating()" class="secondary">Sort by Rating</button>
    </div>

    <div class="result-info" id="resultInfo"></div>

    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Product Name</th>
            <th>Category</th>
            <th>Price (₹)</th>
            <th>Rating</th>
            <th>Stock</th>
            <th>Brand</th>
            <th>In Cart</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    let products = [
      { id:1,  name:"iPhone 15",          category:"Mobile",      price:79999,  rating:4.8, stock:"In Stock",    brand:"Apple",    inCart:true  },
      { id:2,  name:"Samsung Galaxy S24", category:"Mobile",      price:64999,  rating:4.6, stock:"In Stock",    brand:"Samsung",  inCart:false },
      { id:3,  name:"MacBook Air M2",     category:"Laptop",      price:114999, rating:4.9, stock:"Low Stock",   brand:"Apple",    inCart:true  },
      { id:4,  name:"Dell XPS 15",        category:"Laptop",      price:89999,  rating:4.5, stock:"In Stock",    brand:"Dell",     inCart:false },
      { id:5,  name:"Sony WH-1000XM5",    category:"Audio",       price:24999,  rating:4.7, stock:"In Stock",    brand:"Sony",     inCart:true  },
      { id:6,  name:"AirPods Pro 2",      category:"Audio",       price:19999,  rating:4.6, stock:"In Stock",    brand:"Apple",    inCart:false },
      { id:7,  name:"Logitech MX Master", category:"Accessories", price:7999,   rating:4.5, stock:"In Stock",    brand:"Logitech", inCart:true  },
      { id:8,  name:"Samsung 65\" QLED",  category:"TV",          price:94999,  rating:4.4, stock:"Low Stock",   brand:"Samsung",  inCart:false },
      { id:9,  name:"Sony Alpha A7 IV",   category:"Camera",      price:229999, rating:4.8, stock:"Out of Stock",brand:"Sony",     inCart:false },
      { id:10, name:"OnePlus 12",         category:"Mobile",      price:49999,  rating:4.4, stock:"In Stock",    brand:"OnePlus",  inCart:true  },
      { id:11, name:"HP Spectre x360",    category:"Laptop",      price:129999, rating:4.6, stock:"In Stock",    brand:"HP",       inCart:false },
      { id:12, name:"JBL Charge 5",       category:"Audio",       price:13999,  rating:4.3, stock:"In Stock",    brand:"JBL",      inCart:true  },
      { id:13, name:"Mechanical Keyboard",category:"Accessories", price:4999,   rating:4.2, stock:"Out of Stock",brand:"Keychron", inCart:false },
      { id:14, name:"LG OLED 55\"",       category:"TV",          price:119999, rating:4.7, stock:"In Stock",    brand:"LG",       inCart:true  },
      { id:15, name:"Canon EOS R50",      category:"Camera",      price:74999,  rating:4.5, stock:"Low Stock",   brand:"Canon",    inCart:false },
    ];

    let priceSortAsc  = true;
    let ratingSortAsc = false;

    // ── Update summary cards ──
    function updateSummary(filtered) {
      document.getElementById("totalProducts").textContent = filtered.length;
      const cartItems = filtered.filter(p => p.inCart);
      document.getElementById("inCartCount").textContent  = cartItems.length;
      const total = cartItems.reduce((sum, p) => sum + p.price, 0);
      document.getElementById("cartTotal").textContent    = "₹" + total.toLocaleString("en-IN");
      document.getElementById("outOfStock").textContent   = filtered.filter(p => p.stock === "Out of Stock").length;
    }

    function stockClass(stock) {
      if (stock === "In Stock")    return "stock-in";
      if (stock === "Low Stock")   return "stock-low";
      return "stock-out";
    }

    function sortByPrice() {
      products.sort((a, b) => priceSortAsc ? a.price - b.price : b.price - a.price);
      priceSortAsc = !priceSortAsc;
      renderTable();
    }

    function sortByRating() {
      products.sort((a, b) => ratingSortAsc ? a.rating - b.rating : b.rating - a.rating);
      ratingSortAsc = !ratingSortAsc;
      renderTable();
    }

    function renderTable() {
      const search   = document.getElementById("searchInput").value.toLowerCase();
      const category = document.getElementById("categoryFilter").value;
      const cartF    = document.getElementById("cartFilter").value;
      const stockF   = document.getElementById("stockFilter").value;

      let filtered = products.filter(p => {
        const matchName     = p.name.toLowerCase().includes(search);
        const matchCategory = category === "All" || p.category === category;
        const matchCart     = cartF === "All" || (cartF === "cart" ? p.inCart : !p.inCart);
        const matchStock    = stockF === "All" || p.stock === stockF;
        return matchName && matchCategory && matchCart && matchStock;
      });

      updateSummary(filtered);

      document.getElementById("resultInfo").textContent =
        `Showing ${filtered.length} of ${products.length} products`;

      const tbody = document.getElementById("tableBody");

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="no-result">No products found matching your criteria.</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(p => `
        <tr>
          <td>#${p.id}</td>
          <td><b style="color:var(--text-main);">${p.name}</b></td>
          <td><span class="badge badge-${p.category}">${p.category}</span></td>
          <td class="price">₹${p.price.toLocaleString("en-IN")}</td>
          <td class="rating">⭐ ${p.rating}</td>
          <td class="${stockClass(p.stock)}">${p.stock}</td>
          <td>${p.brand}</td>
          <td class="${p.inCart ? 'cart-yes' : 'cart-no'}">${p.inCart ? "✔ Yes" : "✘ No"}</td>
        </tr>
      `).join('');
    }

    renderTable();
  </script>

</body>
</html>
